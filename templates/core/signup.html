<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Auction | Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg, #1e3c72, #2a5298, #0f2027, #203a43);
    background-size:400% 400%;
    animation: gradientBG 12s ease infinite;
}

/* Animated Background */
@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.signup-container{
    width:420px;
    padding:40px;
    border-radius:20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    animation: fadeIn 1.2s ease-in-out;
}

/* Fade In Animation */
@keyframes fadeIn{
    from{opacity:0; transform: translateY(30px);}
    to{opacity:1; transform: translateY(0);}
}

.signup-container h2{
    text-align:center;
    color:rgb(252, 248, 248);
    margin-bottom:25px;
    font-weight:500;
    letter-spacing:1px;
}

form p{
    margin-bottom:18px;
}

/* Floating Inputs */
form input,
form select,
form textarea{
    width:100%;
    padding:12px 15px;
    border-radius:10px;
    border:none;
    outline:none;
    font-size:14px;
    background: rgba(255,255,255,0.2);
    color:rgb(224, 216, 216);
    transition: all 0.3s ease;
}

form input::placeholder{
    color:rgba(226, 223, 223, 0.7);
}

form input:focus,
form select:focus,
form textarea:focus{
    background: rgba(255,255,255,0.35);
    transform: scale(1.03);
}

/* Button */
.signup-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:white;
    color:#2a5298;
    font-weight:600;
    cursor:pointer;
    transition: all 0.3s ease;
    margin-top:10px;
}

.signup-btn:hover{
    background:#2a5298;
    color:white;
    transform: translateY(-3px);
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.login-link{
    text-align:center;
    margin-top:15px;
    font-size:14px;
    color:white;
}

.login-link a{
    color:#ffffff;
    font-weight:bold;
    text-decoration:none;
}

.errorlist{
    list-style:none;
    font-size:13px;
    color:#ffdddd;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="signup-container">
    <h2>Create Account</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="signup-btn">Sign Up</button>
    </form>

    
</div>

</body>
</html>
